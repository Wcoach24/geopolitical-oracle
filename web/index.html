<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geopolitical Oracle — Track Record</title>
<meta name="description" content="Análisis geopolítico con implicaciones financieras. Track record verificable de recomendaciones basadas en frameworks de Ray Dalio y Robert Pape.">
<meta property="og:title" content="Geopolitical Oracle — Track Record">
<meta property="og:description" content="Recomendaciones geopolíticas con seguimiento público. Verificable.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020617;
    --surface: #0E1223;
    --surface-2: #141A2E;
    --border: #1E293B;
    --text: #F8FAFC;
    --text-muted: #8888A0;
    --text-dim: #555570;
    --green: #22C55E;
    --green-bg: rgba(34,197,94,0.08);
    --red: #EF4444;
    --red-bg: rgba(239,68,68,0.08);
    --amber: #F59E0B;
    --amber-bg: rgba(245,158,11,0.08);
    --cyan: #22D3EE;
    --cyan-bg: rgba(34,211,238,0.06);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); line-height:1.6; -webkit-font-smoothing:antialiased; }

  .container { max-width:900px; margin:0 auto; padding:0 20px; }

  /* Header */
  .header { padding:48px 0 32px; border-bottom:1px solid var(--border); }
  .header-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; }
  .brand { font-family:var(--mono); font-size:11px; letter-spacing:3px; color:var(--text-muted); text-transform:uppercase; }
  .tension-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:100px; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
  .tension-alto { background:rgba(239,68,68,0.12); color:var(--red); border:1px solid rgba(239,68,68,0.2); }
  .tension-elevado { background:var(--amber-bg); color:var(--amber); border:1px solid rgba(245,158,11,0.2); }
  .tension-normal { background:var(--green-bg); color:var(--green); border:1px solid rgba(34,197,94,0.2); }
  h1 { font-size:28px; font-weight:700; margin:16px 0 8px; letter-spacing:-0.5px; }
  .subtitle { color:var(--text-muted); font-size:15px; max-width:600px; }

  /* Stats bar */
  .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:1px; background:var(--border); border-radius:12px; overflow:hidden; margin:32px 0; }
  .stat { background:var(--surface); padding:20px 24px; text-align:center; }
  .stat-value { font-family:var(--mono); font-size:28px; font-weight:700; }
  .stat-value.green { color:var(--green); }
  .stat-value.cyan { color:var(--cyan); }
  .stat-value.amber { color:var(--amber); }
  .stat-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }

  /* Sections */
  .section { margin:40px 0; }
  .section-title { font-family:var(--mono); font-size:11px; letter-spacing:2px; color:var(--cyan); text-transform:uppercase; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* Recommendation cards */
  .rec-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:12px; transition:border-color 0.2s ease; }
  .rec-card:hover { border-color:rgba(136,136,160,0.3); }
  .rec-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .rec-asset { font-size:18px; font-weight:600; }
  .rec-badges { display:flex; gap:6px; flex-wrap:wrap; }
  .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:100px; font-size:11px; font-weight:600; letter-spacing:0.5px; }
  .badge-active { background:var(--green-bg); color:var(--green); border:1px solid rgba(34,197,94,0.2); }
  .badge-closed { background:var(--red-bg); color:var(--red); border:1px solid rgba(239,68,68,0.2); }
  .badge-neutral { background:var(--amber-bg); color:var(--amber); border:1px solid rgba(245,158,11,0.2); }
  .badge-direction { background:var(--cyan-bg); color:var(--cyan); border:1px solid rgba(34,211,238,0.15); }

  .rec-context { color:var(--text-muted); font-size:14px; margin-bottom:16px; }
  .rec-meta { display:flex; gap:24px; flex-wrap:wrap; font-size:12px; color:var(--text-dim); font-family:var(--mono); }
  .rec-meta span { display:flex; align-items:center; gap:4px; }

  /* Timeline */
  .timeline { margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
  .timeline-title { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
  .timeline-entry { display:flex; gap:12px; padding:6px 0; font-size:13px; }
  .timeline-date { color:var(--text-dim); font-family:var(--mono); font-size:12px; white-space:nowrap; min-width:60px; }
  .timeline-text { color:var(--text-muted); }
  .timeline-dot { width:6px; height:6px; border-radius:50%; background:var(--border); margin-top:7px; flex-shrink:0; }
